<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me - Ryan Rinkel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 100vh;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255,255,255,0.05);
            flex-shrink: 1;
            min-height: 0;
        }
        video {
            width: 100%;
            max-height: 70vh;
            display: block;
            border-radius: 16px;
            object-fit: contain;
        }
        .info {
            padding: 1rem 0 0.5rem;
            flex-shrink: 0;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }
        .resume-link {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.5;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            transition: opacity 0.3s, border-color 0.3s;
        }
        .resume-link:hover {
            opacity: 1;
            border-color: rgba(255,255,255,0.8);
        }
        .subtitle {
            font-size: 0.75rem;
            opacity: 0.2;
            font-weight: 300;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video autoplay loop muted playsinline>
                <source src="latest.webm" type="video/webm">
            </video>
        </div>
        <div class="info">
            <h1>Ryan Rinkel</h1>
            <a href="resume.html" class="resume-link">View My Resume</a>
            <p class="subtitle">This video is AI-generated and changes periodically.</p>
        </div>
    </div>
    <script>
        setInterval(() => {
            const video = document.querySelector('video');
            const src = video.querySelector('source');
            src.src = 'latest.webm?t=' + Date.now();
            video.load();
            video.play();
        }, 300000);
    </script>
</body>
</html>
